services:
  mysql:
    image: mysql:9.0
    container_name: xiuyanzhe-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: xiuyanzhe
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --innodb-flush-log-at-trx-commit=1 --sync-binlog=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2
    container_name: xiuyanzhe-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiuyanzhe-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=xiuyanzhe
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  mysql-data: