# 限流区域
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# 代理缓存
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Gzip压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 限流
    limit_conn conn_limit 30;
    limit_req zone=api_limit burst=50 nodelay;

    # 阻止访问敏感文件
    location ~ ^/(\.env|\.git|\.aws|config|\.htaccess|\.htpasswd) {
        return 404;
    }
    location ~ /\. {
        deny all;
    }

    # 静态资源 - 长期缓存（一年）
    location /assets/ {
        proxy_pass http://xiuyanzhe-app:8080/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 搜索API - 独立限流 + 代理缓存10秒
    location /api/learn/search {
        limit_req zone=search_limit burst=10 nodelay;
        proxy_pass http://xiuyanzhe-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 通用API代理（后端故障时使用过期缓存）
    location /api/ {
        proxy_pass http://xiuyanzhe-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_cache api_cache;
        proxy_cache_valid 200 1s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    }

    # 静态文件缓存（30天）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://xiuyanzhe-app:8080;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 根路径
    location / {
        proxy_pass http://xiuyanzhe-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
}
